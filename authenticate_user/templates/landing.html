{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeProperty - Premium House Brokerage</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: #333;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* Ensure all sections flow properly */
        section {
            display: block;
            width: 100%;
            clear: both;
        }

        /* Header Styles */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            height: 80px; /* Fixed height for header */
        }

        .logo {
            font-size: 2rem;
            font-weight: 700;
            color: #e46569;
            text-decoration: none;
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-login {
            background: transparent;
            color: #e46569;
            border: 2px solid #e46569;
        }

        .btn-login:hover {
            background: #e46569;
            color: white;
            transform: translateY(-2px);
        }

        .btn-register {
            background: #e46569;
            color: white;
            border: 2px solid #e46569;
        }

        .btn-register:hover {
            background: #d45458;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(228, 101, 105, 0.4);
        }

        /* Hero Section */
        .hero {
            height: calc(100vh - 60px); /* Subtract footer height */
            background: linear-gradient(135deg, rgba(228, 101, 105, 0.9), rgba(228, 101, 105, 0.7)), 
                        url('https://images.unsplash.com/photo-1560518883-ce09059eeffa?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1973&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            margin: 0;
            padding: 0;
        }

        .hero-content h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            animation: slideInUp 1s ease-out;
        }

        .hero-content p {
            font-size: 1.3rem;
            margin-bottom: 2rem;
            opacity: 0.9;
            animation: slideInUp 1s ease-out 0.3s both;
        }

        .hero-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            animation: slideInUp 1s ease-out 0.6s both;
        }

        .btn-hero {
            padding: 15px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: white;
            color: #e46569;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: white;
            border: 2px solid white;
        }

        .btn-secondary:hover {
            background: white;
            color: #e46569;
            transform: translateY(-3px);
        }

        /* Footer */
        .footer {
            background: #222;
            color: white;
            padding: 1rem 5%;
            text-align: center;
            margin: 0;
            position: fixed;
            width: 100%;
            z-index: 999;
            height: 60px; /* Set fixed height */
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-top: 25px;
        }

        /* Animations */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 1rem 3%;
                height: 100px;
            }
            
            .hero {
                height: calc(100vh - 60px); /* Account for footer height */
                margin: 0;
                padding: 0;
            }
            
            .hero-content h1 {
                font-size: 2.5rem;
            }
            
            .hero-content p {
                font-size: 1.1rem;
            }
            
            .hero-buttons {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            
            .nav-buttons {
                flex-direction: column;
                gap: 0.5rem;
            }
            
            .btn {
                width: 100%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="{% url 'landing' %}" class="logo">
            <i class="fas fa-home"></i> PrimeProperty
        </a>
        <div class="nav-buttons">
            <a href="{% url 'login' %}" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Login
            </a>
            <a href="{% url 'register' %}" class="btn btn-register">
                <i class="fas fa-user-plus"></i> Register
            </a>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Find Your Dream Home</h1>
            <p>Premium real estate brokerage with AI-powered property valuation</p>
            <div class="hero-buttons">
                <a href="{% url 'login' %}" class="btn-hero btn-primary">
                    <i class="fas fa-sign-in-alt"></i> Login to Try ML Predictor
                </a>
                <a href="{% url 'register' %}" class="btn-hero btn-secondary">
                    <i class="fas fa-user-plus"></i> Create Account
                </a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        
            <p>&copy; 2025 PrimeProperty. All rights reserved. | Powered by AI Technology</p>
    
    </footer>

    <script>
        // Add smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });

        // Add scroll effect to header
        window.addEventListener('scroll', function() {
            const header = document.querySelector('.header');
            if (window.scrollY > 100) {
                header.style.background = 'rgba(255, 255, 255, 0.98)';
            } else {
                header.style.background = 'rgba(255, 255, 255, 0.95)';
            }
        });
    </script>
</body>
</html>
